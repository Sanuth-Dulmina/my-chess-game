<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess - Speed Turn</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #121212; color: white; }
        #myBoard { width: 90vw; max-width: 400px; margin-bottom: 15px; border: 4px solid #333; }
        .info-panel { padding: 15px; background: #1e1e1e; border-radius: 10px; text-align: center; width: 300px; border-bottom: 4px solid #ff3366; }
        #status { font-weight: bold; color: #ff3366; margin-bottom: 5px; }
        .timer-display { font-size: 2.5em; font-weight: bold; color: #00ffcc; font-family: monospace; }
        .strikes { font-size: 0.9em; color: #aaa; margin-top: 10px; }
        .game-over { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <div id="myBoard"></div>
    <div class="info-panel">
        <div id="status">Connecting...</div>
        <div id="timer" class="timer-display">15</div>
        <div class="strikes">
            W: <span id="w-strikes">0</span>/3 | B: <span id="b-strikes">0</span>/3
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAeuBm7nwaQ06fg5qdUVa5yEf2gnGZp5FQ",
            authDomain: "sigmarounder-j1o0wk.firebaseapp.com",
            databaseURL: "https://sigmarounder-j1o0wk-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sigmarounder-j1o0wk",
            storageBucket: "sigmarounder-j1o0wk.firebasestorage.app",
            messagingSenderId: "789721114924",
            appId: "1:789721114924:web:5edd916cdfa3c503d0a489"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('gameId'); 
        const playerColor = urlParams.get('color') || 'white'; 

        let board = null, game = new Chess(), timerInterval = null;
        const gameRef = db.ref('games/' + gameId);

        function handleTimeout(turn, data) {
            let ws = data.wStrikes || 0, bs = data.bStrikes || 0;
            turn === 'w' ? ws++ : bs++;

            if (ws >= 3 || bs >= 3) {
                const win = (ws >= 3) ? "black" : "white";
                gameRef.update({ gameStatus: 'finished', winner: win, statusMsg: win.toUpperCase() + " wins (Time Out)" });
            } else {
                let next = (turn === 'w') ? 'b' : 'w';
                gameRef.update({ turn: next, timeLeft: 15, wStrikes: ws, bStrikes: bs, statusMsg: (next === 'w' ? "White" : "Black") + "'s Turn" });
            }
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                gameRef.once('value', snap => {
                    const d = snap.val();
                    if (!d || d.gameStatus === 'finished') return clearInterval(timerInterval);
                    if ((d.turn === 'w' && playerColor === 'white') || (d.turn === 'b' && playerColor === 'black')) {
                        let t = (d.timeLeft || 15) - 1;
                        t <= 0 ? handleTimeout(d.turn, d) : gameRef.update({ timeLeft: t });
                    }
                });
            }, 1000);
        }

        function onDrop (source, target) {
            let move = game.move({ from: source, to: target, promotion: 'q' });
            if (!move) return 'snapback';
            
            let upd = { fen: game.fen(), turn: game.turn(), timeLeft: 15, statusMsg: (game.turn()==='w'?"White":"Black")+"'s Turn" };
            if (game.in_checkmate()) { upd.gameStatus = 'finished'; upd.winner = playerColor; upd.statusMsg = "Checkmate! " + playerColor.toUpperCase() + " wins"; }
            gameRef.update(upd);
        }

        gameRef.on('value', snap => {
            const d = snap.val();
            if (!d) return gameRef.set({ fen: 'start', turn: 'w', timeLeft: 15, wStrikes: 0, bStrikes: 0, gameStatus: 'active', statusMsg: "White's Turn" });

            game.load(d.fen);
            board.position(d.fen);
            $('#timer').text(d.timeLeft);
            $('#w-strikes').text(d.wStrikes || 0);
            $('#b-strikes').text(d.bStrikes || 0);
            $('#status').text(d.statusMsg);

            if (d.gameStatus === 'finished') { clearInterval(timerInterval); $('#myBoard').addClass('game-over'); }
            else if (!timerInterval) startTimer();
        });

        board = Chessboard('myBoard', {
            draggable: true, position: 'start', orientation: playerColor,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDragStart: (s, p) => !game.game_over() && !((playerColor==='white'&&p.search(/^b/)!==-1)||(playerColor==='black'&&p.search(/^w/)!==-1)||(game.turn()==='w'&&playerColor==='black')||(game.turn()==='b'&&playerColor==='white')),
            onDrop: onDrop, onSnapEnd: () => board.position(game.fen())
        });
    </script>
</body>
</html>
