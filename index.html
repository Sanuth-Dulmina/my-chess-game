<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess - Speed Turn</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #121212; color: #fff; }
        #myBoard { width: 90vw; max-width: 400px; margin-bottom: 15px; border: 4px solid #333; }
        .info-panel { padding: 15px; background: #1e1e1e; border-radius: 10px; text-align: center; width: 300px; border-bottom: 4px solid #ff3366; }
        #status { font-weight: 700; color: #ff3366; margin-bottom: 5px; }
        .timer-display { font-size: 2.5em; font-weight: 700; color: #00ffcc; font-family: monospace; }
        .strikes { font-size: .9em; color: #aaa; margin-top: 10px; }
        .game-over { opacity: .5; pointer-events: none; }
    </style>
</head>
<body>
    <div id="myBoard"></div>
    <div class="info-panel">
        <div id="status">Connecting...</div>
        <div id="timer" class="timer-display">15</div>
        <div class="strikes">W: <span id="w-strikes">0</span>/3 | B: <span id="b-strikes">0</span>/3</div>
    </div>
