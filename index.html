<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game - Multiplayer</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #1a1a1a; color: white; }
        #myBoard { width: 90vw; max-width: 400px; margin-bottom: 20px; border: 4px solid #333; }
        .info { padding: 15px; background: #2d2d2d; border-radius: 10px; text-align: center; min-width: 250px; border-bottom: 4px solid #00ffcc; }
        #status { font-weight: bold; color: #00ffcc; font-size: 1.2em; }
        .highlight-check { box-shadow: inset 0 0 3px 3px red !important; background-color: rgba(255, 0, 0, 0.6) !important; }
        .game-over-board { opacity: 0.6; pointer-events: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="myBoard"></div>
    <div class="info">
        <div id="status">Connecting...</div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAeuBm7nwaQ06fg5qdUVa5yEf2gnGZp5FQ",
            authDomain: "sigmarounder-j1o0wk.firebaseapp.com",
            databaseURL: "https://sigmarounder-j1o0wk-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sigmarounder-j1o0wk",
            storageBucket: "sigmarounder-j1o0wk.firebasestorage.app",
            messagingSenderId: "789721114924",
            appId: "1:789721114924:web:5edd916cdfa3c503d0a489"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.app().database("https://sigmarounder-j1o0wk-default-rtdb.asia-southeast1.firebasedatabase.app");

        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('gameId'); 
        const playerColor = urlParams.get('color') || 'white'; 

        var board = null;
        var game = new Chess();
        var isGameOver = false;

        if (!gameId || gameId === "" || gameId === "null") {
            document.getElementById('status').innerText = "Error: Invalid Game Link";
            document.getElementById('myBoard').classList.add('hidden');
        } else {
            var gameRef = db.ref('games/' + gameId);
            
            // This stops listening to any previous game data
            gameRef.off(); 

            function updateCheckStatus() {
                $('#myBoard .square-55d63').removeClass('highlight-check');
                if (game.in_check()) {
                    const turn = game.turn();
                    const squares = ['a8','b8','c8','d8','e8','f8','g8','h8','a7','b7','c7','d7','e7','f7','g7','h7','a6','b6','c6','d6','e6','f6','g6','h6','a5','b5','c5','d5','e5','f5','g5','h5','a4','b4','c4','d4','e4','f4','g4','h4','a3','b3','c3','d3','e3','f3','g3','h3','a2','b2','c2','d2','e2','f2','g2','h2','a1','b1','c1','d1','e1','f1','g1','h1'];
                    for (let i = 0; i < squares.length; i++) {
                        const piece = game.get(squares[i]);
                        if (piece && piece.type === 'k' && piece.color === turn) {
                            $('#myBoard .square-' + squares[i]).addClass('highlight-check');
                            break;
                        }
                    }
                }
            }

            function onDragStart (source, piece, position, orientation) {
                if (isGameOver || game.game_over()) return false;
                if ((playerColor === 'white' && piece.search(/^b/) !== -1) ||
                    (playerColor === 'black' && piece.search(/^w/) !== -1) ||
                    (game.turn() === 'w' && playerColor === 'black') ||
                    (game.turn() === 'b' && playerColor === 'white')) {
                    return false;
                }
            }

            function onDrop (source, target) {
                var move = game.move({ from: source, to: target, promotion: 'q' });
                if (move === null) return 'snapback';
                gameRef.update({ fen: game.fen(), turn: game.turn() });
            }

            function onSnapEnd () { board.position(game.fen()); }

            gameRef.on('value', (snapshot) => {
                const data = snapshot.val();
                
                if (data && (data.gameStatus === "finished" || data.gameStatus === "draw")) {
                    isGameOver = true;
                    $('#myBoard').addClass('game-over-board');
                }

                if (data && data.fen) {
                    game.load(data.fen);
                    board.position(data.fen);
                    let statusText = game.turn() === 'w' ? "White's Turn" : "Black's Turn";
                    
                    if (game.in_checkmate() || data.gameStatus === "finished") {
                        const winner = data.winner || (game.turn() === 'w' ? "Black" : "White");
                        statusText = "Checkmate! Winner: " + winner;
                        isGameOver = true;
                    } 
                    else if (game.in_draw() || data.gameStatus === "draw") { statusText = "Game Over - Draw!"; isGameOver = true; } 
                    else if (game.in_check()) { statusText += " (Check!)"; }
                    
                    document.getElementById('status').innerText = statusText;
                    updateCheckStatus();
                } else {
                    // Start a completely fresh board for new Game IDs
                    game = new Chess(); 
                    board.position('start');
                    gameRef.set({ fen: game.fen(), turn: 'w', gameStatus: 'active' });
                }
            });

            board = Chessboard('myBoard', {
                draggable: true,
                position: 'start',
                orientation: playerColor === 'black' ? 'black' : 'white',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                onDragStart: onDragStart,
                onDrop: onDrop,
                onSnapEnd: onSnapEnd
            });
        }
    </script>
</body>
</html>
