<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #1a1a1a; color: white; }
        #myBoard { width: 90vw; max-width: 400px; margin-bottom: 20px; border: 4px solid #333; }
        .info { padding: 15px; background: #2d2d2d; border-radius: 10px; text-align: center; min-width: 250px; border-bottom: 4px solid #00ffcc; }
        #status { font-weight: bold; color: #00ffcc; font-size: 1.2em; }
    </style>
</head>
<body>

    <div id="myBoard"></div>
    <div class="info">
        <div id="status">Connecting...</div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAeuBm7nwaQ06fg5qdUVa5yEf2gnGZp5FQ",
            authDomain: "sigmarounder-j1o0wk.firebaseapp.com",
            databaseURL: "https://sigmarounder-j1o0wk-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sigmarounder-j1o0wk",
            storageBucket: "sigmarounder-j1o0wk.firebasestorage.app",
            messagingSenderId: "789721114924",
            appId: "1:789721114924:web:5edd916cdfa3c503d0a489"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.app().database("https://sigmarounder-j1o0wk-default-rtdb.asia-southeast1.firebasedatabase.app");

        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('gameId'); 
        const playerColor = urlParams.get('color') || 'white'; 

        if (!gameId) {
            document.getElementById('status').innerText = "Status: No Game ID provided";
        }

        var board = null;
        var game = new Chess();
        var gameRef = db.ref('games/' + gameId);

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ((playerColor === 'white' && piece.search(/^b/) !== -1) ||
                (playerColor === 'black' && piece.search(/^w/) !== -1) ||
                (game.turn() === 'w' && playerColor === 'black') ||
                (game.turn() === 'b' && playerColor === 'white')) {
                return false;
            }
        }

        function onDrop (source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            
            gameRef.update({
                fen: game.fen(),
                turn: game.turn()
            });
        }

        function onSnapEnd () { board.position(game.fen()); }

        gameRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.fen) {
                game.load(data.fen);
                board.position(data.fen);
                document.getElementById('status').innerText = game.turn() === 'w' ? "White's Turn" : "Black's Turn";
            } else if (gameId) {
                gameRef.set({ fen: game.fen(), turn: 'w' });
            }
        });

        board = Chessboard('myBoard', {
            draggable: true,
            position: 'start',
            orientation: playerColor === 'black' ? 'black' : 'white',
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        });
    </script>
</body>
</html>
