<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigmarounder Chess</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #1a1a1a; color: white; }
        #myBoard { width: 90vw; max-width: 400px; margin-bottom: 20px; border: 4px solid #333; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .info { padding: 15px; background: #2d2d2d; border-radius: 10px; text-align: center; min-width: 250px; border-bottom: 4px solid #00ffcc; }
        #status { font-weight: bold; color: #00ffcc; font-size: 1.2em; }
    </style>
</head>
<body>

    <div id="myBoard"></div>
    <div class="info">
        <div id="status">Loading Game...</div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAeuBm7nwaQ06fg5qdUVa5yEf2gnGZp5FQ",
            authDomain: "sigmarounder-j1o0wk.firebaseapp.com",
            databaseURL: "https://sigmarounder-j1o0wk-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sigmarounder-j1o0wk",
            storageBucket: "sigmarounder-j1o0wk.firebasestorage.app",
            messagingSenderId: "789721114924",
            appId: "1:789721114924:web:5edd916cdfa3c503d0a489",
            measurementId: "G-L86M0MWK6H"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Get Parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('gameId') || 'default_test'; 
        const playerColor = urlParams.get('color') || 'white'; 

        var board = null;
        var game = new Chess();
        var gameRef = db.ref('games/' + gameId);

        // Move logic
        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ((playerColor === 'white' && piece.search(/^b/) !== -1) ||
                (playerColor === 'black' && piece.search(/^w/) !== -1) ||
                (game.turn() === 'w' && playerColor === 'black') ||
                (game.turn() === 'b' && playerColor === 'white')) {
                return false;
            }
        }

        function onDrop (source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            
            gameRef.update({
                fen: game.fen(),
                turn: game.turn()
            });

            if (game.game_over()) {
                let winner = game.in_checkmate() ? (game.turn() === 'w' ? 'black' : 'white') : 'draw';
                gameRef.update({ status: "finished", winner: winner });
            }
        }

        function onSnapEnd () { board.position(game.fen()); }

        // Real-time Update from Firebase
        gameRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.fen) {
                game.load(data.fen);
                board.position(data.fen);
                let turnText = game.turn() === 'w' ? "White's Turn" : "Black's Turn";
                document.getElementById('status').innerText = data.status === "finished" ? "Winner: " + data.winner.toUpperCase() : turnText;
            } else {
                // Initialize game if not exist
                gameRef.set({ fen: game.fen(), turn: 'w', status: 'playing' });
            }
        });

        // Board Config with Piece Images Fix
        var config = {
            draggable: true,
            position: 'start',
            orientation: playerColor === 'black' ? 'black' : 'white',
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        };
        board = Chessboard('myBoard', config);
    </script>
</body>
</html>
